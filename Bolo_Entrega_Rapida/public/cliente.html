<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel do Cliente</title>
  <link rel="stylesheet" href="css/cliente.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🎂</div>
      <div>
        <h1>Bolo Entrega Rápida</h1>
        <span>Painel do Cliente</span>
      </div>
    </div>
    <button id="logoutBtn" class="logout-btn">Sair</button>
  </header>

  <main class="page">
    <section class="card">
      <div class="card-header">
        <h2>Fazer Pedido</h2>
      </div>

      <form id="pedidoForm" class="pedido-grid">
        <div class="field">
          <label>Cliente</label>
          <input type="text" id="clienteNome" readonly />
        </div>

        <div class="field">
          <label>Data de entrega</label>
          <input type="date" id="dataEntrega" required />
        </div>

        <div class="field">
          <label>Altura (m)</label>
          <input type="number" step="0.01" min="0" id="altura" required />
        </div>

        <div class="field">
          <label>Comprimento (m)</label>
          <input type="number" step="0.01" min="0" id="comprimento" required />
        </div>

        <div class="field">
          <label>Formato</label>
          <select id="formato" required>
            <option value="">Selecione</option>
            <option>Redondo</option>
            <option>Quadrado</option>
          </select>
        </div>

        <div class="field">
          <label>Número de camadas</label>
          <input type="number" id="camadas" min="1" required />
        </div>

        <div class="field">
          <label>Sabor</label>
          <select id="sabor" required>
            <option value="">Selecione</option>
            <option>Chocolate</option>
            <option>Inglês</option>
          </select>
        </div>

        <div class="field field-full">
          <label>Recheio</label>
          <select id="recheio" required>
            <option value="">Selecione</option>
            <option>Doce de Leite</option>
            <option>Brigadeiro</option>
            <option>Goiabada</option>
          </select>
        </div>

        <div class="field result-box">
          <label>Área do bolo</label>
          <input type="text" id="area" readonly />
        </div>

        <div class="field result-box">
          <label>Valor total</label>
          <input type="text" id="valorTotal" readonly />
        </div>

        <div class="field result-box">
          <label>Sinal (mínimo 50%)</label>
          <input type="number" id="sinal" min="0" step="0.01" required />
          <small id="sinalHint" class="hint-text"></small>
        </div>

        <div class="field field-full">
          <button type="submit" class="primary-btn">Fazer pedido</button>
        </div>
      </form>

      <p id="pedidoMensagem" class="message"></p>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Meus Pedidos</h2>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Data</th>
              <th>Área</th>
              <th>Formato</th>
              <th>Camadas</th>
              <th>Sabor</th>
              <th>Recheio</th>
              <th>Sinal</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="meusPedidosBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Recibo</h2>
        <button id="emitirReciboBtn" class="primary-btn small-btn">Emitir Recibo</button>
      </div>

      <div id="reciboBox" class="recibo-box">
        <p>Selecione ou crie um pedido para emitir o recibo.</p>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/cliente.js"></script>
</body>
</html>
