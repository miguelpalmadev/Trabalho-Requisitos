<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel do Confeiteiro</title>
  <link rel="stylesheet" href="css/confeiteiro.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🎂</div>
      <div>
        <h1>Bolo Entrega Rápida</h1>
        <span>Painel do Confeiteiro</span>
      </div>
    </div>
    <button id="logoutBtn" class="logout-btn">Sair</button>
  </header>

  <main class="page">
    <section class="card">
      <div class="card-header">
        <h2>Calendário de Entregas</h2>
        <div class="calendar-actions">
          <button id="prevMonth" class="nav-btn">‹</button>
          <span id="monthLabel"></span>
          <button id="nextMonth" class="nav-btn">›</button>
        </div>
      </div>

      <div id="calendar" class="calendar"></div>
      <p class="legend"><span class="full-day"></span> Dia lotado (4 pedidos)</p>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Resumo dos Pedidos</h2>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Cliente</th>
              <th>Área</th>
              <th>Formato</th>
              <th>Sabor</th>
              <th>Camadas</th>
              <th>Recheio</th>
              <th>Sinal</th>
              <th>Total</th>
              <th>Entrega</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="pedidosBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Recibo</h2>
        <button id="emitirReciboConfeiteiroBtn" class="primary-btn small-btn">Emitir Recibo</button>
      </div>

      <div id="reciboConfeiteiroBox" class="recibo-box">
        <p>Selecione um pedido no resumo para visualizar o recibo.</p>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/confeiteiro.js"></script>
</body>
</html>
