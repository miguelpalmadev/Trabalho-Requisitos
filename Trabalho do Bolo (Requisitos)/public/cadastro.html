<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-wrapper">
    <section class="auth-card auth-card-register">
      <div class="logo-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M6 10.5C6 9.67 6.67 9 7.5 9h9c.83 0 1.5.67 1.5 1.5V17a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-6.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M8 9V7.8c0-.9.73-1.63 1.63-1.63.46 0 .9.2 1.2.55L12 8l1.17-1.28c.3-.35.74-.55 1.2-.55.9 0 1.63.73 1.63 1.63V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 13h6M9.5 16h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M7 9h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>

      <h1 class="auth-title">Criar Conta</h1>
      <p class="auth-subtitle">Junte-se ao Bolo Entrega Rápida</p>

      <form id="cadastroForm" novalidate>
        <div class="form-group">
          <label class="form-label">Tipo de conta</label>

          <div class="account-type-grid">
            <button type="button" class="type-card active" data-group="register-role" data-value="cliente">
              <span class="selected-check">✓</span>
              <span class="type-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M12 12a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.7"/>
                  <path d="M5 19a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
              </span>
              <strong>Cliente</strong>
              <small>Faça pedidos de bolos</small>
            </button>

            <button type="button" class="type-card" data-group="register-role" data-value="confeiteiro">
              <span class="type-icon">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M8 8.5A4 4 0 1 1 16 8.5C16 10.5 14.5 11.5 14.5 13v1h-5v-1c0-1.5-1.5-2.5-1.5-4.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                  <path d="M9.5 17h5M10 20h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
              </span>
              <strong>Confeiteiro</strong>
              <small>Gerencie seus pedidos</small>
            </button>
          </div>

          <input type="hidden" id="registerRole" name="registerRole" value="cliente" />
        </div>

        <div class="form-group">
          <label for="nome" class="form-label">Nome completo *</label>
          <input
            type="text"
            id="nome"
            name="nome"
            class="form-input"
            placeholder="Seu nome"
            required
          />
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">E-mail *</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="seu@email.com"
            required
          />
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="telefone" class="form-label">Telefone</label>
          <input
            type="text"
            id="telefone"
            name="telefone"
            class="form-input"
            placeholder="(00) 00000-0000"
            maxlength="15"
          />
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="senha" class="form-label">Senha *</label>
          <div class="password-field">
            <input
              type="password"
              id="senha"
              name="senha"
              class="form-input"
              placeholder="Mínimo 6 caracteres"
              required
              minlength="6"
            />
            <button type="button" class="toggle-password" data-target="senha" aria-label="Mostrar senha">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" stroke="currentColor" stroke-width="1.7"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/>
              </svg>
            </button>
          </div>
          <span class="error-message"></span>
        </div>

        <div class="form-group">
          <label for="confirmarSenha" class="form-label">Confirmar senha *</label>
          <input
            type="password"
            id="confirmarSenha"
            name="confirmarSenha"
            class="form-input"
            placeholder="Repita a senha"
            required
            minlength="6"
          />
          <span class="error-message"></span>
        </div>

        <button type="submit" class="submit-btn">Criar conta</button>

        <p class="bottom-text">
          Já tem uma conta?
          <a href="login.html">Entrar</a>
        </p>
      </form>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
